[[projects]]
name = "Goose"
tagline = "A background job processing library for Clojure with native support for RabbitMQ and Redis."
description = "Goose supports enqueuing jobs for async execution, scheduled execution, batch processing, and cron jobs — with native support for both RabbitMQ and Redis as message brokers. Error handling and retries are built in, and the message broker and metrics backend are pluggable. A jobs management console provides visibility into queue state and job lifecycle. It is currently used in production across multiple companies."
