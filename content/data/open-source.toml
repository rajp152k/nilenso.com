[[projects]]
name = "Megasthenes"
tagline = "Ask plain-language questions about any GitHub or GitLab repository — public or private — and get sourced, structured answers."
description = "Megasthenes lets you ask plain-language questions about any GitHub or GitLab repository and get sourced, structured answers pinned to a specific branch, tag, or commit. It supports any model via OpenRouter, Anthropic, or Google, runs tool execution in an isolated container, and ships with built-in OpenTelemetry tracing and an LLM-judge evaluation system to track answer quality over time."
icon = "/images/svg/sparkle.svg"
media_type = "code"
code_sample = '''import { Client } from "@nilenso/megasthenes";

const client = new Client();
const session = await client.connect({
  repo: { url: "https://github.com/owner/repo" },
  model: { provider: "anthropic", id: "claude-sonnet-4-6" },
  maxIterations: 20,
});

// Stream events as they arrive
const stream = session.ask("What frameworks does this project use?");
for await (const event of stream) {
  if (event.type === "text_delta") process.stdout.write(event.delta);
}

// Or wait for the complete result
const result = await session.ask("How are the tests structured?").result();
console.log(result.steps); // All steps: text, tool calls, thinking, etc.
console.log(result.usage); // Token usage across all iterations

await session.close();'''
github_url = "https://github.com/nilenso/megasthenes"
docs_url = "https://nilenso.github.io/megasthenes"

[[projects]]
name = "GRPO Trainer"
tagline = "Toolkit to fine-tune LLMs"
description = "grpo-trainer is a toolkit for fine-tuning LLMs to generate high-quality OCaml code. It supports supervised fine-tuning (SFT), RLVR/GRPO training, evaluation, and monitoring with feedback from the OCaml compiler and test suite."
icon = "/images/svg/sparkle.svg"
github_url = "https://github.com/nilenso/grpo-trainer"
media_type = "code"
code_sample = '''

# Clone repository
git clone https://github.com/nilenso/grpo-trainer.git
cd grpo-trainer

# Enter nix shell
make shell

# Run the script
scripts/bootstrap.sh

# Start model server
llama-server -hf unsloth/Qwen2.5-Coder-1.5B-Instruct-GGUF:F16 -c 4096 -ngl -1
'''
