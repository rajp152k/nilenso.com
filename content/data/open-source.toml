[[projects]]
name = "Context Viewer"
tagline = "Break a conversation log into its parts and visualise how each grows across turns in token count and relative weight."
description = "Context Viewer takes a conversation log, breaks it down into constituent components — system prompts, tool calls, generated artefacts, user instructions — and visualises how each grows across turns in token count and relative weight. It uses AI-assisted semantic chunking to flag redundancy and irrelevance, and runs entirely in the browser with support for OpenAI conversation formats."
